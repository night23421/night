<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 手机端适配核心配置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>香蕉溯源信息</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f9f7;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            color: #333;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }

        .title {
            text-align: center;
            color: #2d8a3b;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .info-item {
            margin: 12px 0;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }

        .label {
            font-weight: bold;
            color: #555;
            display: inline-block;
            width: 100px;
        }

        /* 物流时间轴样式 */
        .timeline {
            margin-top: 15px;
            border-left: 2px solid #2d8a3b;
            padding-left: 20px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 15px;
            padding-bottom: 5px;
        }

        .timeline-item::before {
            content: "";
            width: 10px;
            height: 10px;
            background: #2d8a3b;
            border-radius: 50%;
            position: absolute;
            left: -26px;
            top: 5px;
        }

        .time {
            font-size: 12px;
            color: #888;
        }

        .status {
            font-weight: bold;
            color: #333;
        }

        /* 结论样式 */
        .conclusion {
            background: #e6f7e9;
            color: #2d8a3b;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
        }

        .error {
            color: #e53935;
            text-align: center;
            font-size: 18px;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // 1. 获取URL中的id参数
        function getQueryId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // 2. 加载产品数据并渲染页面
        async function loadProduct() {
            const app = document.getElementById('app');
            const productId = getQueryId();

            // 无ID时提示
            if (!productId) {
                app.innerHTML = '<div class="error">未找到溯源产品，请扫描正确二维码</div>';
                return;
            }

            try {
                // 读取products.json数据
                const response = await fetch('products.json');
                const products = await response.json();
                // 根据ID查找对应产品
                const product = products.find(item => item.id === productId);

                if (!product) {
                    app.innerHTML = '<div class="error">该产品不存在，溯源信息无效</div>';
                    return;
                }

                // 渲染溯源信息
                app.innerHTML = `
                    <div class="card">
                        <h2 class="title">🍌 食品溯源信息</h2>
                        
                        <div class="info-item">
                            <span class="label">产品名称：</span>
                            <span>${product.name}</span>
                        </div>
                        <div class="info-item">
                            <span class="label">产品编号：</span>
                            <span>${product.serial}</span>
                        </div>
                        <div class="info-item">
                            <span class="label">批次号：</span>
                            <span>${product.batch}</span>
                        </div>
                        <div class="info-item">
                            <span class="label">产地：</span>
                            <span>${product.origin}</span>
                        </div>
                        <div class="info-item">
                            <span class="label">生产日期：</span>
                            <span>${product.produceDate}</span>
                        </div>
                        <div class="info-item">
                            <span class="label">检测结果：</span>
                            <span style="color:${product.testResult === '合格' ? '#2d8a3b' : '#e53935'}">${product.testResult}</span>
                        </div>

                        <div style="margin-top:25px;">
                            <h3 style="margin-bottom:10px; color:#2d8a3b;">📦 物流信息</h3>
                            <div class="timeline">
                                ${product.logistics.map(item => `
                                    <div class="timeline-item">
                                        <div class="time">${item.time}</div>
                                        <div class="status">${item.status}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="conclusion">
                            ${product.conclusion}
                        </div>
                    </div>
                `;

            } catch (err) {
                app.innerHTML = '<div class="error">数据加载失败，请刷新重试</div>';
                console.error(err);
            }
        }

        // 初始化执行
        loadProduct();
    </script>
</body>
</html>
