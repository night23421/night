<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食品溯源</title>
</head>
<body>
<div id="result"></div>

<script>
const params = new URLSearchParams(location.search)
const id = params.get('id')

fetch('products.json')
.then(res => res.json())
.then(list => {
  const item = list.find(i => i.id === id)
  if (!item) {
    document.getElementById('result').innerText = '未找到产品'
    return
  }
  document.getElementById('result').innerHTML = `
    <h2>${item.name}</h2>
    <p>编号：${item.id}</p>
    <p>批次：${item.batch}</p>
    <p>产地：${item.origin}</p>
    <p>日期：${item.date}</p>
    <p>保质期：${item.shelfLife}</p>
    <p>企业：${item.producer}</p>
    <p>检测：${item.testResult}</p>
    <p>机构：${item.testOrg}</p>
    <h4>物流</h4>
    <ul>${item.logistics.map(x => `<li>${x}</li>`).join('')}</ul>
    <p>结论：${item.conclusion}</p>
  `
})
</script>
</body>
</html>
